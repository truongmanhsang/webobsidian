name: Release desktop apps

# Build cross-platform desktop installers and publish them to a GitHub Release.
# Trigger: push a version tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`),
# or run manually from the Actions tab.
#
# Each runner builds installers for its OWN platform natively (mac on macOS,
# win on Windows, linux on Ubuntu) — no cross-compilation / wine needed. Because
# the bundled server has no native node modules, every CPU arch (x64/arm64/ia32)
# is produced just by packing the matching prebuilt Electron binary.
#
# electron-builder uploads assets to a DRAFT release for the tag. After all three
# jobs finish, open the draft release on GitHub and click "Publish".

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web + server
        run: npm run build

      - name: Package & publish desktop installers
        run: npm --workspace desktop run dist:publish
        env:
          # electron-builder publishes to GitHub Releases with this token.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Apps are unsigned (no certificates) — skip macOS code-signing/notarize
          # so the build doesn't fail looking for an identity.
          CSC_IDENTITY_AUTO_DISCOVERY: false
